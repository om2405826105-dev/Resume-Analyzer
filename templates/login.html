<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | AI Resume Analyzer</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body class="auth-page">
  <div class="auth-bg-grid"></div>
  <div class="auth-orb-1"></div>
  <div class="auth-orb-2"></div>
  
  <div class="auth-card">
    <div class="auth-header">
      <a href="/" style="text-decoration: none;">
        <h2 class="auth-title"><span class="brand-icon">⚡</span> ResumeAI</h2>
      </a>
      <p class="auth-subtitle">Welcome back! Please login to your account.</p>
    </div>

    {% if error %}
    <div class="auth-alert">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}">
      <div class="auth-form-group">
        <label>Email Address</label>
        <input type="email" name="email" class="form-control auth-input" placeholder="name@example.com" required autofocus>
      </div>
      <div class="auth-form-group">
        <label>Password</label>
        <input type="password" name="password" class="form-control auth-input" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn btn-primary-custom auth-btn">Log In</button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="{{ url_for('register') }}">Sign Up</a>
    </div>
  </div>
</body>
</html>
